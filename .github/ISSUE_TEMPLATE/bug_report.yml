name: Bug Report
description: Report a reproducible problem in Wavee.
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove secrets, license keys, private files, and personal audio before submitting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Start Wavee.
        2. Press the configured recording hotkey.
        3. Stop recording and wait for transcription.
        4. Describe the incorrect result or error shown.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Wavee Version Or Commit
      placeholder: "v1.0.0"
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
  - type: textarea
    id: logs
    attributes:
      label: Logs Or Screenshots
      description: Add logs or screenshots if helpful. Remove secrets first.
