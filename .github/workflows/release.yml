name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.prepare-release.outputs.release_id }}
      release_was_draft: ${{ steps.prepare-release.outputs.release_was_draft }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Or Reuse Release
        id: prepare-release
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tagName = `v${{ steps.version.outputs.version }}`;
            const releaseName = `Wavee ${tagName}`;
            const body = 'See the assets section below to download the installer for your platform.';

            const { data: releases } = await github.rest.repos.listReleases({
              owner,
              repo,
              per_page: 100
            });

            const matching = releases.filter((release) => release.tag_name === tagName);
            let release = matching.find((candidate) => !candidate.draft) || matching[0];

            if (release) {
              core.info(`Reusing ${release.draft ? 'draft' : 'published'} release ${release.id} for ${tagName}.`);
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                name: release.name || releaseName,
                body: release.body || body,
                prerelease: false
              });
            } else {
              core.info(`Creating draft release for ${tagName}.`);
              const response = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tagName,
                name: releaseName,
                body,
                draft: true,
                prerelease: false
              });
              release = response.data;
            }

            core.setOutput('release_id', String(release.id));
            core.setOutput('release_was_draft', String(release.draft));

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin --bundles dmg,app"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin --bundles dmg,app"
          - platform: "windows-latest"
            args: "--bundles nsis,msi"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Setup libclang for bindgen (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install llvm
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "LIBCLANG_PATH=${LLVM_PREFIX}/lib" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=${LLVM_PREFIX}/lib:${DYLD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Setup CMake for native builds (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install cmake
          CMAKE_BIN="$(command -v cmake)"
          echo "CMAKE=${CMAKE_BIN}" >> "$GITHUB_ENV"

      - name: Setup CMake for native builds (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $cmake = "${env:ProgramFiles}\CMake\bin\cmake.exe"
          if (-not (Test-Path -LiteralPath $cmake)) {
            $cmake = (Get-Command cmake.exe -ErrorAction Stop).Source
          }
          if (-not (Test-Path -LiteralPath $cmake)) {
            throw "cmake.exe not found at $cmake"
          }
          "CMAKE=$cmake" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & $cmake --version

      - name: Import Windows signing certificate
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            Write-Warning "WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD secrets are not set. Building unsigned Windows installer."
            exit 0
          }

          $certPath = Join-Path $env:RUNNER_TEMP "wavee-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))

          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          if (-not $cert -or [string]::IsNullOrWhiteSpace($cert.Thumbprint)) {
            throw "Failed to import Windows signing certificate."
          }

          "WINDOWS_CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure Windows signing
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERTIFICATE_THUMBPRINT != ''
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_THUMBPRINT)) {
            throw "WINDOWS_CERTIFICATE_THUMBPRINT was not set."
          }

          $configPath = "src-tauri\tauri.conf.json"
          $config = Get-Content -LiteralPath $configPath -Raw | ConvertFrom-Json
          $config.bundle.windows.certificateThumbprint = $env:WINDOWS_CERTIFICATE_THUMBPRINT
          $config.bundle.windows.allowDowngrades = $false
          $config | ConvertTo-Json -Depth 100 | Set-Content -LiteralPath $configPath -Encoding utf8

      - name: Setup ONNX Runtime for Intel macOS
        if: contains(matrix.args, 'x86_64-apple-darwin')
        run: |
          ORT_VERSION="1.23.2"
          ORT_ARCHIVE="onnxruntime-osx-x86_64-${ORT_VERSION}.tgz"
          ORT_ROOT="${RUNNER_TEMP}/onnxruntime"
          curl -L "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/${ORT_ARCHIVE}" -o "${RUNNER_TEMP}/${ORT_ARCHIVE}"
          mkdir -p "${ORT_ROOT}"
          tar -xzf "${RUNNER_TEMP}/${ORT_ARCHIVE}" -C "${ORT_ROOT}"
          ORT_DIR="${ORT_ROOT}/onnxruntime-osx-x86_64-${ORT_VERSION}"
          echo "ORT_LIB_PATH=${ORT_DIR}/lib" >> "$GITHUB_ENV"
          echo "ORT_LIB_LOCATION=${ORT_DIR}/lib" >> "$GITHUB_ENV"
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=${ORT_DIR}/lib:${DYLD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
          includeUpdaterJson: true

      - name: Upload macOS updater app archive
        if: matrix.platform == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "${{ matrix.args }}" == *"aarch64-apple-darwin"* ]]; then
            TARGET="aarch64-apple-darwin"
            ARCH="aarch64"
          else
            TARGET="x86_64-apple-darwin"
            ARCH="x64"
          fi

          MACOS_BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle/macos"
          APP_NAME="$(find "$MACOS_BUNDLE_DIR" -maxdepth 1 -name "*.app" -type d -print -quit)"

          if [[ -z "$APP_NAME" ]]; then
            echo "::error::No .app bundle found in ${MACOS_BUNDLE_DIR}"
            find "src-tauri/target/${TARGET}/release/bundle" -maxdepth 3 -print || true
            exit 1
          fi

          ARCHIVE="Wavee_${VERSION}_${ARCH}.app.tar.gz"
          COPYFILE_DISABLE=1 tar -C "$MACOS_BUNDLE_DIR" \
            --exclude='._*' \
            --exclude='.DS_Store' \
            -czf "$ARCHIVE" "$(basename "$APP_NAME")"

          gh release upload "$GITHUB_REF_NAME" "$ARCHIVE" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  publish-release:
    runs-on: ubuntu-latest
    needs: [create-release, build-tauri]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Generate release checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --dir release-assets \
            --clobber

          cargo install tauri-cli --version "^2" --locked

          latest_generated=false
          if VERSION="${GITHUB_REF_NAME#v}" \
            REQUIRE_ALL_PLATFORMS=true \
            node scripts/generate-latest-json.mjs release-assets release-assets/latest.json; then
            latest_generated=true
          else
            echo "::warning::Updater manifest signing failed. Publishing release assets and checksums without latest.json."
            rm -f release-assets/latest.json
          fi

          sig_files=()
          for sig_file in release-assets/*.sig; do
            [[ -e "$sig_file" ]] || continue
            sig_files+=("$sig_file")
          done

          if (( ${#sig_files[@]} > 0 )); then
            gh release upload "$GITHUB_REF_NAME" "${sig_files[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            echo "No standalone .sig files were generated; latest.json contains updater signatures."
          fi

          if [[ "$latest_generated" == "true" && -f release-assets/latest.json ]]; then
            gh release upload "$GITHUB_REF_NAME" release-assets/latest.json \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            echo "Skipping latest.json upload because updater signing did not complete."
          fi

          cd release-assets
          sha256sum * | sort -k2 > SHA256SUMS.txt
          gh release upload "$GITHUB_REF_NAME" SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Publish Release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
          release_was_draft: ${{ needs.create-release.outputs.release_was_draft }}
        with:
          script: |
            const payload = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.release_id),
              body: [
                'See the assets section below to download the installer for your platform.'
              ].join('\n')
            };

            if (process.env.release_was_draft === 'true') {
              payload.draft = false;
            }

            await github.rest.repos.updateRelease(payload);
