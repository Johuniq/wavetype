name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.version.outputs.version }}`,
              name: `WaveType v${{ steps.version.outputs.version }}`,
              body: 'See the assets section below to download the installer for your platform.',
              draft: true,
              prerelease: false
            });
            return data.id

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev libssl-dev libxdo-dev libclang-dev clang cmake
          LIBCLANG_PATH="$(llvm-config --libdir)"
          echo "LIBCLANG_PATH=${LIBCLANG_PATH}" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${LIBCLANG_PATH}:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "CMAKE=$(command -v cmake)" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Setup libclang for bindgen (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install llvm
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "LIBCLANG_PATH=${LLVM_PREFIX}/lib" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=${LLVM_PREFIX}/lib:${DYLD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Setup CMake for native builds (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install cmake
          CMAKE_BIN="$(command -v cmake)"
          echo "CMAKE=${CMAKE_BIN}" >> "$GITHUB_ENV"

      - name: Setup CMake for native builds (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $cmake = "${env:ProgramFiles}\CMake\bin\cmake.exe"
          if (-not (Test-Path -LiteralPath $cmake)) {
            $cmake = (Get-Command cmake.exe -ErrorAction Stop).Source
          }
          if (-not (Test-Path -LiteralPath $cmake)) {
            throw "cmake.exe not found at $cmake"
          }
          "CMAKE=$cmake" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & $cmake --version

      - name: Setup ONNX Runtime for Intel macOS
        if: matrix.args == '--target x86_64-apple-darwin'
        run: |
          ORT_VERSION="1.23.2"
          ORT_ARCHIVE="onnxruntime-osx-x86_64-${ORT_VERSION}.tgz"
          ORT_ROOT="${RUNNER_TEMP}/onnxruntime"
          curl -L "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/${ORT_ARCHIVE}" -o "${RUNNER_TEMP}/${ORT_ARCHIVE}"
          mkdir -p "${ORT_ROOT}"
          tar -xzf "${RUNNER_TEMP}/${ORT_ARCHIVE}" -C "${ORT_ROOT}"
          ORT_DIR="${ORT_ROOT}/onnxruntime-osx-x86_64-${ORT_VERSION}"
          echo "ORT_LIB_PATH=${ORT_DIR}/lib" >> "$GITHUB_ENV"
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=${ORT_DIR}/lib:${DYLD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
          includeUpdaterJson: true

  publish-release:
    runs-on: ubuntu-latest
    needs: [create-release, build-tauri]
    permissions:
      contents: write
    steps:
      - name: Publish Release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
            })
