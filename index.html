<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Wavee — Wave Your Voice Into Text</title>
    <meta
      name="description"
      content="Wavee puts your voice at your cursor. Hold a hotkey, speak naturally, and get private local AI text in any app on Windows and macOS."
    />
    <meta
      name="keywords"
      content="Wavee, voice to cursor, desktop dictation, voice to text, speech to text, offline transcription, local transcription, private AI writing, Tauri app"
    />
    <meta name="author" content="Johuniq" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://github.com/johuniq/wavee" />

    <!-- Mobile & Theme -->
    <meta name="theme-color" content="#09090b" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Wavee — Wave Your Voice Into Text"
    />
    <meta
      property="og:description"
      content="Hold a hotkey, speak naturally, and let Wavee place polished text at your cursor with local AI on Windows and macOS."
    />
    <meta property="og:site_name" content="Wavee" />
    <meta property="og:url" content="https://github.com/johuniq/wavee" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Wavee — Wave Your Voice Into Text"
    />
    <meta
      name="twitter:description"
      content="Voice at your cursor with local AI. No cloud uploads, fast hotkeys, and private history."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Structured data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Wavee",
        "url": "https://github.com/johuniq/wavee",
        "description": "Wavee is a local-first desktop dictation app for Windows and macOS that turns your voice into text at your cursor.",
        "applicationCategory": "DesktopApplication",
        "operatingSystem": "Windows, macOS",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "publisher": {
          "@type": "Organization",
          "name": "Wavee",
          "url": "https://github.com/johuniq/wavee"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
